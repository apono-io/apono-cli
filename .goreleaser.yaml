project_name: apono-cli
before:
  hooks:
    - make manpage completions
    - go mod tidy
    # Pre-build the apono:// handler bundle for inclusion in the macOS archive.
    # Brew's post_install can't osacompile a bundle on the user's machine
    # (sandbox restriction), so we build it once here in CI and ship it.
    - bash -c 'if [ "$(uname)" = "Darwin" ]; then mkdir -p .build && go run ./cmd/build-handler-bundle ".build/Apono Connect.app"; fi'

builds:
  - id: apono
    binary: apono
    main: ./cmd/apono
    env:
      - CGO_ENABLED=0
    goos:
      - windows
      - darwin
      - linux
      - openbsd
    goarch:
      - amd64
      - arm
      - arm64
    goarm:
      - "6"
      - "7"
    ignore:
      - goos: openbsd
        goarch: arm
      - goos: openbsd
        goarch: arm64
    flags:
      - -trimpath
    asmflags:
      - all=-trimpath={{ if index .Env "GITHUB_WORKSPACE"  }}{{.Env.GITHUB_WORKSPACE}}{{ else }}{{.Env.PWD}}{{ end }}
    gcflags:
      - all=-trimpath={{ if index .Env "GITHUB_WORKSPACE"  }}{{.Env.GITHUB_WORKSPACE}}{{ else }}{{.Env.PWD}}{{ end }}
    ldflags:
      - -s -w -X github.com/apono-io/apono-cli/pkg/build.Version=v{{.Version}} -X github.com/apono-io/apono-cli/pkg/build.Commit={{.ShortCommit}} -X github.com/apono-io/apono-cli/pkg/build.Date={{.Date}}
    mod_timestamp: "{{ .CommitTimestamp }}"

archives:
  - id: windows
    format_overrides:
      - goos: windows
        format: zip
    rlcp: true
    files:
      - LICENSE
      - contrib/completion/**/*
      - contrib/manpage/*
      # macOS-only: ship the pre-built apono:// handler bundle. Brew's
      # post_install will `open -a` this to trigger self-install into
      # ~/Library/Application Support/apono-cli/. Other platforms ignore
      # the file (it's just present in the tarball).
      - src: ".build/Apono Connect.app"
        dst: "Apono Connect.app"

nfpms:
  - vendor: Apono
    homepage: https://www.apono.io/
    maintainer: Apono Support <support@apono.io>
    description: View, request and receive permissions to services, DBs and applications.
    license: Apache 2.0
    formats:
      - deb
      - rpm
    contents:
      # manpages
      - src: "./contrib/manpage/apono*.1"
        dst: "/usr/share/man/man1"
      # bash
      - src: "./contrib/completion/bash/apono"
        dst: "/usr/share/bash-completion/completions/exo"
      # zsh
      - src: "./contrib/completion/zsh/_apono"
        dst: "/usr/share/zsh/vendor-completions/_exo"

brews:
  - tap:
      owner: apono-io
      name: homebrew-tap
      token: "{{ .Env.HOMEBREW_TAP_GITHUB_TOKEN }}"
    folder: Formula
    homepage: "https://www.apono.io"
    description: "View, request and receive permissions to services, DBs and applications."
    license: "Apache-2.0"
    test: |
      system "#{bin}/apono version"
    install: |
      bin.install "apono" => "apono"
      man1.install Dir["contrib/manpage/apono*.1"]
      bash_completion.install "contrib/completion/bash/apono"
      zsh_completion.install "contrib/completion/zsh/_apono"
      (pkgshare/"handler").install "Apono Connect.app"
    post_install: |
      if OS.mac?
        bundle = "#{pkgshare}/handler/Apono Connect.app"
        # `open -a` launches the bundle in user-context launchd (not brew's
        # sandbox). The bundle's AppleScript `on run` handler then self-installs
        # into ~/Library/Application Support/apono-cli/ and registers with
        # LaunchServices. Brew's own context is sandboxed out of user $HOME, so
        # this two-step launch is the only path that works without manual user action.
        system "/usr/bin/open", "-a", bundle
      end

scoop:
  bucket:
    owner: apono-io
    name: scoop-bucket
    token: "{{ .Env.SCOOP_TAP_GITHUB_TOKEN }}"
  folder: bucket
  homepage: "https://www.apono.io"
  description: "View, request and receive permissions to services, DBs and applications."
  license: "Apache-2.0"

checksum:
  name_template: 'checksums.txt'
  algorithm: sha256

signs:
  - artifacts: checksum
    args:
      # if you are using this in a GitHub action or some other automated pipeline, you
      # need to pass the batch flag to indicate its not interactive.
      - "--batch"
      - "--local-user"
      - "{{ .Env.GPG_FINGERPRINT }}" # set this environment variable for your signing key
      - "--output"
      - "${signature}"
      - "--detach-sign"
      - "${artifact}"

snapshot:
  name_template: "{{ incpatch .Version }}-snapshot"

changelog:
  sort: asc
  filters:
    exclude:
      - '^docs:'
      - '^test:'

release:
  prerelease: auto
